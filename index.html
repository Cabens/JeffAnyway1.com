<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jeff Anyway Music</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    min-height:100vh;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.15) 0%, transparent 20%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.12) 0%, transparent 25%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,.10) 0%, transparent 20%),
    linear-gradient(
        180deg,
        #67AEEB 0%,
        #4F9EE0 40%,
        #3A84CC 100%
    );

    display:flex;
    justify-content:center;
    overflow-x:hidden;
}

/* Notas musicales decorativas */
.music-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
}

.music-bg span{
    position:absolute;
    color:rgba(255,255,255,.08);
    font-size:120px;
    font-weight:bold;
}

.music-bg span:nth-child(1){
    top:5%;
    left:10%;
}

.music-bg span:nth-child(2){
    top:15%;
    right:12%;
}

.music-bg span:nth-child(3){
    top:40%;
    left:5%;
}

.music-bg span:nth-child(4){
    top:55%;
    right:8%;
}

.music-bg span:nth-child(5){
    bottom:12%;
    left:20%;
}

.music-bg span:nth-child(6){
    bottom:5%;
    right:18%;
}

.container{
    position:relative;
    z-index:1;
    width:100%;
    max-width:430px;
    padding:20px;
}

.title{
    text-align:center;
    color:#fff8e8;
    margin-top:40px;
    margin-bottom:30px;
    text-transform:uppercase;
}

.title .small{
    font-size:24px;
    font-weight:900;
    letter-spacing:3px;
    text-shadow:0 2px 10px rgba(0,0,0,.15);
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.btn{
    background:rgba(34,65,104,.45);
    backdrop-filter:blur(8px);

    border-radius:14px;

    min-height:78px;

    color:white;
    text-decoration:none;
    font-size:22px;
    font-weight:700;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    transition:.25s ease;
}

.btn:hover{
    background:rgba(34,65,104,.70);
    transform:translateY(-2px);
}

.btn i{
    font-size:30px;
}

.btn.large{
    font-size:28px;
    font-weight:900;
}

.footer{
    text-align:center;
    margin-top:40px;
    margin-bottom:20px;
}

.footer a{
    color:#ffffffb0;
    text-decoration:none;
    font-size:14px;
}

</style>
</head>
<body>

<div class="music-bg">
    <span>♪</span>
    <span>♫</span>
    <span>♬</span>
    <span>♪</span>
    <span>♫</span>
    <span>♬</span>
</div>

<div class="container">

    <div class="title">
        <div class="small">Jeff Anyway</div>
        <div class="small">EP Compromiso</div>
    </div>

    <div class="links">

        <a href="https://music.apple.com/cl/artist/jeff-anyway/1467167046" class="btn">
            <i class="bi bi-apple"></i>
            Apple Music
        </a>

        <a href="https://open.spotify.com/intl-es/artist/0duDsHknW44uOee4ZNlZdS" class="btn">
            <i class="bi bi-spotify"></i>
            Spotify
        </a>

        <a href="https://www.youtube.com/@jeffanywayofficial1741" class="btn">
            <i class="bi bi-youtube"></i>
            YouTube
        </a>

        <a href="https://music.amazon.com/artists/B07SRC4KKF/jeff-anyway" class="btn">
            <i class="bi bi-amazon"></i>
            Amazon Music
        </a>

        <a href="#" class="btn">
            <i class="bi bi-bar-chart-fill"></i>
            Deezer
        </a>

        <a href="#" class="btn">
            <i class="bi bi-broadcast"></i>
            Pandora
        </a>

        <a href="https://tidal.com/artist/15956004" class="btn">
            <i class="bi bi-soundwave"></i>
            TIDAL
        </a>

        <a href="#" class="btn">
            <i class="bi bi-bag-fill"></i>
            MeRCH
        </a>

        <a href="#" class="btn large">
            <i class="bi bi-vinyl-fill"></i>
            VINILO
        </a>

        <a href="#" class="btn large">
            <i class="bi bi-globe-americas"></i>
            WoRLD TOUR
        </a>

    </div>

</div>

</body>
</html>
